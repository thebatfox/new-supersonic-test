name: Update Gallery Manifests

on:
  workflow_dispatch:

jobs:
  update-manifests:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate gallery manifests
        run: python3 scripts/gen_manifests.py

      - name: Commit manifests
        run: |
          git config user.name "Supersonic Deploy"
          git config user.email "deploy@supersoniccustoms.co.za"
          git add public/gallery/**/images.json
          git diff --staged --quiet || git commit -m "Auto: update gallery manifests"
          git push
